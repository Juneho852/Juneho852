version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: matchai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchai
      POSTGRES_PASSWORD: matchai_secret
      POSTGRES_DB: matchai_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: matchai_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
