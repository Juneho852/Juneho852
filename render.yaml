services:
  - type: web
    name: matchai-api
    runtime: node
    buildCommand: cd apps/api && npm install --include=dev && npx prisma generate && npm run build
    startCommand: cd apps/api && npx prisma migrate deploy && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PROXY_SERVICE_SID
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DOCUSIGN_INTEGRATION_KEY
        sync: false
      - key: DOCUSIGN_ACCOUNT_ID
        sync: false
      - key: DOCUSIGN_PRIVATE_KEY
        sync: false
